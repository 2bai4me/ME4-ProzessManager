<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ME4 ProzessManager</title>
<style>
:root {
  --color-primary: #c60024;
  --color-accent: #0f446b;
  --color-bg: #0a0a0a;
  --color-bg-elevated: #13131a;
  --color-surface: #1a1a24;
  --color-border: #374151;
  --color-text: #d1d5db;
  --color-text-dim: #6b7280;
  --color-text-muted: #9ca3af;
  --color-success: #059669;
  --color-warning: #f59e0b;
  --color-danger: #ef4444;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --space-1: 4px;
  --space-2: 8px;
  --space-3: 12px;
  --space-4: 16px;
  --space-5: 24px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); min-height: 100vh; overflow: hidden; }

/* ─── Header ─── */
.header { background: var(--color-bg-elevated); border-bottom: 1px solid var(--color-border); padding: 0 var(--space-5); height: 52px; display: flex; align-items: center; gap: var(--space-3); flex-shrink: 0; }
.header .logo { width: 28px; height: 28px; border-radius: var(--radius-md); background: var(--color-primary); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.header .logo svg { width: 16px; height: 16px; }
.header .brand { font-weight: 700; font-size: 0.95rem; color: #fff; }
.header .version { font-size: 0.65rem; color: var(--color-text-dim); font-weight: 400; }
.header .spacer { flex: 1; }
.header .nav-btn { font-size: 0.75rem; color: var(--color-text-dim); background: transparent; border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 4px 10px; cursor: pointer; }
.header .nav-btn.active { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
.header .refresh { font-size: 0.65rem; color: var(--color-text-dim); }

/* ─── Layout ─── */
.main-layout { display: flex; height: calc(100vh - 52px); }
.sidebar { width: 220px; background: var(--color-bg-elevated); border-right: 1px solid var(--color-border); display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: var(--space-3); border-bottom: 1px solid var(--color-border); font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-dim); }
.board-list { flex: 1; overflow-y: auto; padding: var(--space-2); }
.board-item { padding: var(--space-2) var(--space-3); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.8rem; margin-bottom: 2px; transition: all 0.15s; display: flex; align-items: center; gap: var(--space-2); }
.board-item:hover { background: rgba(255,255,255,0.04); }
.board-item.active { background: var(--color-accent); color: #fff; }
.board-item .badge { margin-left: auto; font-size: 0.6rem; background: rgba(255,255,255,0.1); padding: 1px 6px; border-radius: 10px; }
.board-item.active .badge { background: rgba(255,255,255,0.2); }
.board-item.has-blocked { border-left: 2px solid var(--color-danger); }

.content { flex: 1; overflow-y: auto; padding: var(--space-5); display: flex; flex-direction: column; gap: var(--space-4); }

/* ─── Alert Banner ─── */
.alert-banner { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: var(--radius-md); padding: var(--space-3) var(--space-4); display: none; align-items: center; gap: var(--space-3); }
.alert-banner.visible { display: flex; }
.alert-banner .icon { font-size: 1.1rem; }
.alert-banner .text { flex: 1; font-size: 0.8rem; }
.alert-banner .count { background: var(--color-danger); color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 0.7rem; font-weight: 700; }

/* ─── Pipeline (Kanban) ─── */
.pipeline { display: flex; gap: var(--space-3); min-height: 350px; }
.column { flex: 1; background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-3); display: flex; flex-direction: column; }
.column h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--space-3); display: flex; align-items: center; gap: var(--space-2); }
.column h3 .dot { width: 7px; height: 7px; border-radius: 50%; }
.col-todo .dot { background: var(--color-text-dim); }
.col-ready .dot { background: var(--color-accent); }
.col-running .dot { background: var(--color-warning); animation: pulse 1s infinite; }
.col-blocked { border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.02); }
.col-blocked h3 { color: var(--color-danger); }
.col-blocked .dot { background: var(--color-danger); animation: pulse 1s infinite; }
.col-done .dot { background: var(--color-success); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.task-card { background: rgba(255,255,255,0.02); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: var(--space-3); margin-bottom: var(--space-2); font-size: 0.78rem; cursor: default; transition: all 0.15s; }
.task-card:hover { border-color: var(--color-accent); }
.task-card .title { font-weight: 600; margin-bottom: 2px; }
.task-card .meta { font-size: 0.65rem; color: var(--color-text-dim); display: flex; gap: var(--space-2); align-items: center; }
.task-card .reason { display: none; font-size: 0.68rem; padding: var(--space-2); margin-top: var(--space-2); border-radius: var(--radius-sm); }
.task-card.blocked { border: 1.5px solid var(--color-danger); background: rgba(239,68,68,0.04); cursor: pointer; box-shadow: 0 0 10px rgba(239,68,68,0.08); animation: glowBlocked 2.5s infinite; }
.task-card.blocked:hover { box-shadow: 0 0 20px rgba(239,68,68,0.2); }
.task-card.blocked .reason { display: block; background: rgba(239,68,68,0.06); color: #fca5a5; line-height: 1.5; }
.task-card.blocked .reason strong { color: #f87171; }
.task-card.blocked .action-hint { display: block; font-size: 0.6rem; color: var(--color-accent); margin-top: 4px; }
.task-card.running { border-left: 3px solid var(--color-warning); }
.task-card.done { border-left: 3px solid var(--color-success); opacity: 0.6; }
@keyframes glowBlocked { 0%,100%{box-shadow:0 0 6px rgba(239,68,68,0.06)} 50%{box-shadow:0 0 18px rgba(239,68,68,0.18)} }
.empty-state { text-align: center; color: var(--color-text-dim); padding: 30px; font-size: 0.8rem; flex: 1; display: flex; align-items: center; justify-content: center; }

/* ─── Timeline ─── */
.timeline-view { display: none; flex-direction: column; gap: 0; }
.timeline-view.visible { display: flex; }
.timeline-entry { display: flex; gap: var(--space-3); padding: var(--space-2) 0; border-bottom: 1px solid rgba(55,65,81,0.3); font-size: 0.78rem; align-items: flex-start; }
.timeline-entry .time { color: var(--color-text-dim); min-width: 55px; font-family: var(--font-mono); font-size: 0.7rem; padding-top: 1px; }
.timeline-entry .icon { min-width: 22px; text-align: center; font-size: 0.85rem; }
.timeline-entry .detail { flex: 1; }
.timeline-entry .detail .task-title { font-weight: 500; }
.timeline-entry .detail .task-meta { font-size: 0.65rem; color: var(--color-text-dim); }
.timeline-entry.done .icon { color: var(--color-success); }
.timeline-entry.running .icon { color: var(--color-warning); }
.timeline-entry.blocked .icon { color: var(--color-danger); }

/* ─── Decision Overlay ─── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; }
.overlay.visible { display: flex; }
.dialog { background: var(--color-bg-elevated); border: 1px solid var(--color-danger); border-radius: var(--radius-lg); padding: var(--space-5); max-width: 520px; width: 90%; box-shadow: 0 0 50px rgba(239,68,68,0.15); }
.dialog h2 { font-size: 0.95rem; color: var(--color-danger); margin-bottom: var(--space-2); display: flex; align-items: center; gap: var(--space-2); }
.dialog .task-name { font-size: 0.85rem; font-weight: 600; margin-bottom: var(--space-4); }
.dialog .info-block { font-size: 0.78rem; padding: var(--space-3); border-radius: var(--radius-sm); margin-bottom: var(--space-3); line-height: 1.5; }
.dialog .info-block.grund { background: rgba(239,68,68,0.06); border-left: 3px solid var(--color-danger); }
.dialog .info-block.frage { background: rgba(59,130,246,0.06); border-left: 3px solid var(--color-accent); }
.dialog .info-block.vorschlag { background: rgba(5,150,105,0.06); border-left: 3px solid var(--color-success); }
.dialog .info-block strong { display: block; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
.dialog label { font-size: 0.75rem; color: var(--color-text-dim); display: block; margin-bottom: var(--space-2); }
.dialog textarea { width: 100%; background: var(--color-bg); border: 1px solid var(--color-border); color: var(--color-text); padding: var(--space-3); border-radius: var(--radius-sm); font-size: 0.8rem; resize: vertical; min-height: 70px; font-family: var(--font-body); }
.dialog textarea:focus { outline: none; border-color: var(--color-accent); }
.dialog .actions { display: flex; gap: var(--space-2); margin-top: var(--space-4); justify-content: flex-end; }
.dialog .btn { padding: var(--space-2) var(--space-4); border-radius: var(--radius-sm); font-weight: 600; font-size: 0.8rem; cursor: pointer; border: none; }
.dialog .btn-decide { background: var(--color-accent); color: #fff; }
.dialog .btn-decide:hover { background: #0d3a56; }
.dialog .btn-cancel { background: transparent; border: 1px solid var(--color-border); color: var(--color-text-dim); }

/* ─── Task Detail Panel ─── */
.detail-panel { background: var(--color-bg-elevated); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: var(--space-4); display: none; }
.detail-panel.visible { display: block; }
.detail-panel h3 { font-size: 0.85rem; margin-bottom: var(--space-3); display: flex; gap: var(--space-2); align-items: center; }
.detail-panel .events { max-height: 200px; overflow-y: auto; }
.detail-panel .event { font-size: 0.72rem; padding: 4px 0; border-bottom: 1px solid rgba(55,65,81,0.2); display: flex; gap: var(--space-2); }
.detail-panel .event .ts { color: var(--color-text-dim); font-family: var(--font-mono); min-width: 140px; }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5z"/></svg>
  </div>
  <span class="brand">ME4 ProzessManager</span>
  <span class="version">v0.2</span>
  <span class="spacer"></span>
  <button class="nav-btn active" id="btn-kanban" onclick="switchView('kanban')">📋 Kanban</button>
  <button class="nav-btn" id="btn-timeline" onclick="switchView('timeline')">📜 Chronologie</button>
  <span class="refresh" id="refresh-indicator">🔄 live</span>
</header>

<!-- ─── Main Layout ─── -->
<div class="main-layout">
  <aside class="sidebar">
    <div class="sidebar-header">Kanban Boards</div>
    <div class="board-list" id="board-list">Lade...</div>
  </aside>

  <section class="content" id="content">
    <div class="alert-banner" id="alert-banner">
      <span class="icon">⚠️</span>
      <span class="text" id="alert-text"></span>
      <span class="count" id="alert-count"></span>
    </div>

    <!-- Kanban View -->
    <div class="pipeline" id="pipeline-view">
      <div class="empty-state">👈 Board auswählen</div>
    </div>

    <!-- Timeline View -->
    <div class="timeline-view" id="timeline-view">
      <div class="empty-state">Keine Einträge</div>
    </div>

    <!-- Task Detail -->
    <div class="detail-panel" id="detail-panel"></div>
  </section>
</div>

<!-- ─── Decision Dialog ─── -->
<div class="overlay" id="decision-overlay">
  <div class="dialog">
    <h2>⊘ Entscheidung erforderlich</h2>
    <div class="task-name" id="dlg-task-name"></div>
    <div class="info-block grund" id="dlg-grund"></div>
    <div class="info-block frage" id="dlg-frage"></div>
    <div class="info-block vorschlag" id="dlg-vorschlag"></div>
    <label>Deine Entscheidung:</label>
    <textarea id="dlg-input" placeholder="z.B. 'Option 1 umsetzen' oder 'Mit user_id als Key weitermachen'"></textarea>
    <div class="actions">
      <button class="btn btn-cancel" onclick="cancelDecision()">Abbrechen</button>
      <button class="btn btn-decide" onclick="submitDecision()">✅ Entscheiden & Fortsetzen</button>
    </div>
  </div>
</div>

<script>
const API = '';
let currentBoard = null, currentView = 'kanban', decisionTaskId = null;
let allTasks = [];

const statusCols = [
  { key: 'todo', label: '📥 Todo', cls: 'col-todo' },
  { key: 'ready', label: '▶ Ready', cls: 'col-ready' },
  { key: 'running', label: '🔄 Running', cls: 'col-running' },
  { key: 'blocked', label: '⊘ Blocked', cls: 'col-blocked' },
  { key: 'done', label: '✅ Done', cls: 'col-done' },
];

function switchView(view) {
  currentView = view;
  document.getElementById('btn-kanban').classList.toggle('active', view === 'kanban');
  document.getElementById('btn-timeline').classList.toggle('active', view === 'timeline');
  document.getElementById('pipeline-view').style.display = view === 'kanban' ? 'flex' : 'none';
  document.getElementById('timeline-view').classList.toggle('visible', view === 'timeline');
  renderView();
}

async function loadBoards() {
  const res = await fetch(API + '/api/boards');
  const boards = await res.json();
  document.getElementById('board-list').innerHTML = boards.map(b => `
    <div class="board-item ${currentBoard===b.slug?'active':''} ${b.counts.includes('blocked')?'has-blocked':''}" onclick="selectBoard('${b.slug}')">
      ${b.name}<span class="badge">${b.counts||'leer'}</span>
    </div>
  `).join('');
}

async function selectBoard(slug) {
  currentBoard = slug;
  await loadBoards();
  await loadTasks();
}

async function loadTasks() {
  if (!currentBoard) return;
  const res = await fetch(API + '/api/board/' + currentBoard + '/tasks');
  allTasks = await res.json();

  // Get block reasons for blocked tasks
  for (const t of allTasks.filter(x => x.status === 'blocked')) {
    try {
      const dr = await fetch(API + '/api/board/' + currentBoard + '/task/' + t.id);
      const d = await dr.json();
      t.blockReason = d.summary || '';
    } catch(e) { t.blockReason = ''; }
  }

  // Alert banner
  const blocked = allTasks.filter(t => t.status === 'blocked');
  const banner = document.getElementById('alert-banner');
  if (blocked.length) {
    banner.classList.add('visible');
    document.getElementById('alert-text').textContent = blocked.length + ' Task(s) warten auf deine Entscheidung — klicke auf rot markierte Karten';
    document.getElementById('alert-count').textContent = blocked.length;
  } else { banner.classList.remove('visible'); }

  renderView();
  document.getElementById('refresh-indicator').textContent = '🔄 live • ' + new Date().toLocaleTimeString();
}

function renderView() {
  if (currentView === 'kanban') renderKanban();
  else renderTimeline();
}

function renderKanban() {
  const grouped = {};
  for (const c of statusCols) grouped[c.key] = [];
  for (const t of allTasks) { if (grouped[t.status]) grouped[t.status].push(t); }

  document.getElementById('pipeline-view').innerHTML = statusCols.map(col => `
    <div class="column ${col.cls}">
      <h3><span class="dot"></span>${col.label} (${grouped[col.key].length})</h3>
      ${grouped[col.key].map(t => {
        let reasonHtml = '';
        if (t.status === 'blocked' && t.blockReason) {
          const parts = parseBlockReason(t.blockReason);
          reasonHtml = `<div class="reason">${parts}</div><div class="action-hint">👆 Klicken für Entscheidung</div>`;
        }
        return `<div class="task-card ${t.status}" onclick="${t.status==='blocked'?`openDecision('${t.id}','${escAttr(t.title)}','${escAttr(t.blockReason||'')}')`:`showDetail('${t.id}')`}">
          <div class="title">${t.title}</div>
          <div class="meta"><span>👤 ${t.assignee}</span><span>${t.id.substring(0,10)}</span></div>
          ${reasonHtml}
        </div>`;
      }).join('') || '<div class="empty-state">—</div>'}
    </div>
  `).join('');
}

function renderTimeline() {
  const sorted = [...allTasks].sort((a,b) => b.id.localeCompare(a.id));
  const el = document.getElementById('timeline-view');
  if (!sorted.length) { el.innerHTML = '<div class="empty-state">Keine Tasks</div>'; return; }
  el.innerHTML = sorted.map(t => {
    const icon = {done:'✅',running:'🔄',blocked:'⊘',ready:'▶',todo:'📥'}[t.status]||'•';
    const cls = t.status;
    return `<div class="timeline-entry ${cls}">
      <span class="time">${t.id.substring(0,10)}</span>
      <span class="icon">${icon}</span>
      <div class="detail">
        <div class="task-title">${t.title}</div>
        <div class="task-meta">👤 ${t.assignee} · ${t.status}</div>
      </div>
    </div>`;
  }).join('');
}

function parseBlockReason(reason) {
  if (!reason) return 'Kein Grund angegeben';
  // Parse GRUND/FRAGE/VORSCHLAG from reason text
  let html = '';
  const mGrund = reason.match(/GRUND[:\s]+(.+?)(?=FRAGE[:\s]|VORSCHLAG[:\s]|$)/is);
  const mFrage = reason.match(/FRAGE[:\s]+(.+?)(?=VORSCHLAG[:\s]|$)/is);
  const mVorschlag = reason.match(/VORSCHLAG[:\s]+(.+?)$/is);
  if (mGrund) html += '<strong>🔴 GRUND:</strong> ' + mGrund[1].trim() + '<br>';
  if (mFrage) html += '<strong>🔵 FRAGE:</strong> ' + mFrage[1].trim() + '<br>';
  if (mVorschlag) html += '<strong>🟢 VORSCHLAG:</strong> ' + mVorschlag[1].trim();
  if (!html) html = reason;
  return html;
}

function showDetail(taskId) {
  const t = allTasks.find(x => x.id === taskId);
  if (!t) return;
  document.getElementById('detail-panel').classList.add('visible');
  document.getElementById('detail-panel').innerHTML = `
    <h3>📋 ${t.title}</h3>
    <div style="font-size:0.75rem;color:var(--color-text-dim);margin-bottom:8px;">Status: ${t.status} · Assignee: ${t.assignee} · ID: ${t.id}</div>
    <div class="events"><div class="event"><span class="ts">Details</span>Klicke auf eine Blocked-Karte für Entscheidungen</div></div>`;
}

function openDecision(taskId, title, reason) {
  decisionTaskId = taskId;
  document.getElementById('dlg-task-name').textContent = title;
  const parts = parseBlockReason(reason);
  document.getElementById('dlg-grund').innerHTML = parts.includes('GRUND') ? parts.split('🔵')[0] : '<strong>🔴 GRUND:</strong> Keine Details';
  document.getElementById('dlg-frage').innerHTML = parts.includes('FRAGE') ? '<strong>🔵 FRAGE:</strong>' + parts.split('🔵 FRAGE:</strong>')[1]?.split('🟢')[0] || '' : '<strong>🔵 FRAGE:</strong> Was soll getan werden?';
  document.getElementById('dlg-vorschlag').innerHTML = parts.includes('VORSCHLAG') ? '<strong>🟢 VORSCHLAG:</strong>' + parts.split('🟢 VORSCHLAG:</strong>')[1] || '' : '';
  document.getElementById('dlg-input').value = '';
  document.getElementById('decision-overlay').classList.add('visible');
  setTimeout(() => document.getElementById('dlg-input').focus(), 100);
}

function cancelDecision() {
  decisionTaskId = null;
  document.getElementById('decision-overlay').classList.remove('visible');
}

async function submitDecision() {
  const d = document.getElementById('dlg-input').value.trim();
  if (!d || !decisionTaskId) return;
  const btn = document.querySelector('.btn-decide');
  btn.textContent = '⏳...'; btn.disabled = true;
  await fetch(API + '/api/board/' + currentBoard + '/task/' + decisionTaskId + '/decide', {
    method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({decision:d})
  });
  cancelDecision();
  btn.textContent = '✅ Entscheiden & Fortsetzen'; btn.disabled = false;
  await loadTasks();
}

function escAttr(s) { return (s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;').replace(/\n/g,' '); }

loadBoards();
setInterval(loadTasks, 5000);
setTimeout(() => selectBoard('testlauf-humansimmulation'), 300);
</script>
</body>
</html>
